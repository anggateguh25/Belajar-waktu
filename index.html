<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belajar Waktu ⏰</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #333;
        }

        /* ----- AREA LANGIT & PEMANDANGAN (Gaya Kartun Lucu) ----- */
        .scene {
            position: relative;
            width: 100%;
            height: 48vh;
            max-height: 450px;
            overflow: hidden;
            background: #aad5eb; /* Langit siang yang cerah */
        }

        /* Lapisan untuk efek senja/pagi */
        .sky-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transition: opacity 0.1s;
            pointer-events: none;
        }
        #sunset-sky {
            background: linear-gradient(to bottom, #ffac81, #ff928b);
            opacity: 0;
        }
        #night-sky {
            background: linear-gradient(to bottom, #112d3c, #1a4d6b, #1d6a8b);
            opacity: 0;
        }

        /* Bintang-bintang sederhana di malam hari */
        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(white 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            opacity: 0.6;
        }

        /* Awan bergerak */
        .clouds {
            position: absolute;
            top: 20px;
            width: 100%;
            height: 100px;
            opacity: 0.8;
            pointer-events: none;
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            animation: moveClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }
        .cloud-1 {
            width: 100px; height: 40px; top: 10px; left: 20%;
            animation-duration: 25s;
        }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 50px; }
        .cloud-2 {
            width: 120px; height: 50px; top: 40px; left: 60%;
            animation-duration: 30s; animation-delay: -5s;
        }
        .cloud-2::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-2::after { width: 50px; height: 50px; top: -20px; left: 55px; }

        @keyframes moveClouds {
            from { left: 100%; }
            to { left: -150px; }
        }

        /* Poros Matahari & Bulan */
        .celestial-pivot {
            position: absolute;
            bottom: -50px;
            left: 50%;
            width: 0; height: 0;
            z-index: 1;
            transform-origin: bottom center;
        }

        .sun, .moon {
            position: absolute;
            font-size: 100px;
            left: -50px;
            top: -380px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .moon { color: #f9d71c; }

        /* Pemandangan Bukit Kartun di depan */
        .landscape {
            position: absolute;
            bottom: -60px;
            left: -15%;
            width: 130%;
            height: 180px;
            background: #27ae60;
            border-radius: 50% 50% 0 0;
            z-index: 2;
            border-top: 6px solid #1f8b4d;
        }
        .landscape-2 {
            position: absolute;
            bottom: -40px;
            right: -25%;
            width: 90%;
            height: 140px;
            background: #1f8b4d;
            border-radius: 50% 50% 0 0;
            z-index: 3;
        }

        /* ----- ELEMEN PEMANDANGAN BARU ----- */
        .scene-item {
            position: absolute;
            z-index: 4;
            pointer-events: none;
            font-size: 80px;
        }
        .house { bottom: 70px; left: 15%; font-size: 100px; }
        .tree-1 { bottom: 100px; left: 40%; font-size: 110px; }
        .tree-2 { bottom: 90px; right: 20%; font-size: 100px; }
        .cat { bottom: 70px; left: 60%; font-size: 50px; animation: wagTail 2s infinite ease-in-out; }

        @keyframes wagTail {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Burung terbang (Diperbarui agar maju ke kanan) */
        .birds {
            position: absolute;
            top: 80px;
            width: 100%;
            display: none;
            z-index: 1;
            pointer-events: none;
        }
        .bird {
            position: absolute;
            font-size: 24px;
            animation: flyBirds 12s linear infinite;
        }
        .bird-1 { left: 10%; top: 10px; animation-duration: 12s; }
        .bird-2 { left: 30%; top: -20px; animation-duration: 15s; animation-delay: 2s; }
        .bird-3 { left: 15%; top: 40px; animation-duration: 10s; animation-delay: 1s; }

        @keyframes flyBirds {
            0% { transform: translateX(-100%) scaleX(1); }
            100% { transform: translateX(110vw) scaleX(1); }
        }

        /* ----- AREA JAM INTERAKTIF ----- */
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 10;
            background: rgba(255,255,255,0.7);
            border-radius: 30px 30px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .digital-clock {
            font-size: 2.8rem;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 15px 35px;
            border-radius: 25px;
            border: 6px solid #ffd700;
            margin-bottom: 25px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            text-align: center;
        }

        .clock {
            position: relative;
            width: 270px;
            height: 270px;
            background: white;
            border-radius: 50%;
            border: 14px solid #f39c12;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
            touch-action: none;
            cursor: pointer;
        }

        .number {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            width: 100%;
            text-align: center;
            height: 100%;
            top: 0; left: 0;
            pointer-events: none;
        }
        .number span {
            display: inline-block;
            margin-top: 15px;
        }

        .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 22px; height: 22px;
            background: #2c3e50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            border: 4px solid #ffd700;
        }

        .hand {
            position: absolute;
            bottom: 50%; left: 50%;
            transform-origin: bottom;
            border-radius: 12px;
            z-index: 4;
            pointer-events: none;
        }

        .hour-hand {
            width: 10px;
            height: 75px;
            background: #e74c3c;
            margin-left: -5px;
        }

        .minute-hand {
            width: 7px;
            height: 110px;
            background: #3498db;
            margin-left: -3.5px;
        }
        
        .instruction {
            margin-top: 20px;
            font-size: 1.3rem;
            color: #555;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="scene">
        <div id="sunset-sky" class="sky-layer"></div>
        <div id="night-sky" class="sky-layer">
            <div class="stars"></div>
        </div>
        
        <div class="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
        </div>

        <div class="birds" id="birds">
            <div class="bird bird-1">🐦</div>
            <div class="bird bird-2">🐦</div>
            <div class="bird bird-3">🐦</div>
        </div>

        <div class="celestial-pivot" id="sun-pivot">
            <div class="sun">☀️</div>
        </div>
        <div class="celestial-pivot" id="moon-pivot">
            <div class="moon">🌛</div>
        </div>

        <div class="landscape"></div>
        <div class="landscape-2"></div>

        <div class="scene-item house">🏠</div>
        <div class="scene-item tree-1">🌳</div>
        <div class="scene-item tree-2">🌲</div>
        <div class="scene-item cat">🐈</div>
    </div>

    <div class="controls">
        <div class="digital-clock" id="digital-clock">12:00 Siang</div>
        
        <div class="clock" id="clock">
            <div class="number" style="transform: rotate(30deg)"><span style="transform: rotate(-30deg)">1</span></div>
            <div class="number" style="transform: rotate(60deg)"><span style="transform: rotate(-60deg)">2</span></div>
            <div class="number" style="transform: rotate(90deg)"><span style="transform: rotate(-90deg)">3</span></div>
            <div class="number" style="transform: rotate(120deg)"><span style="transform: rotate(-120deg)">4</span></div>
            <div class="number" style="transform: rotate(150deg)"><span style="transform: rotate(-150deg)">5</span></div>
            <div class="number" style="transform: rotate(180deg)"><span style="transform: rotate(-180deg)">6</span></div>
            <div class="number" style="transform: rotate(210deg)"><span style="transform: rotate(-210deg)">7</span></div>
            <div class="number" style="transform: rotate(240deg)"><span style="transform: rotate(-240deg)">8</span></div>
            <div class="number" style="transform: rotate(270deg)"><span style="transform: rotate(-270deg)">9</span></div>
            <div class="number" style="transform: rotate(300deg)"><span style="transform: rotate(-300deg)">10</span></div>
            <div class="number" style="transform: rotate(330deg)"><span style="transform: rotate(-330deg)">11</span></div>
            <div class="number" style="transform: rotate(360deg)"><span style="transform: rotate(-360deg)">12</span></div>

            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="minute-hand"></div>
            <div class="center-dot"></div>
        </div>
        
        <div class="instruction">Putar jamnya dengan jarimu! 👆🐔🦗🐈</div>
    </div>

    <audio id="rooster-sound" preload="auto">
        <source src="rooster-crowing.mp3" type="audio/mpeg">
    </audio>
    <audio id="cricket-sound" preload="auto" loop>
        <source src="cricket.mp3" type="audio/mpeg">
    </audio>

    <script>
        const clock = document.getElementById('clock');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const digitalClock = document.getElementById('digital-clock');
        
        const sunPivot = document.getElementById('sun-pivot');
        const moonPivot = document.getElementById('moon-pivot');
        const sunsetSky = document.getElementById('sunset-sky');
        const nightSky = document.getElementById('night-sky');
        const birds = document.getElementById('birds');
        
        const roosterAudio = document.getElementById('rooster-sound');
        const cricketAudio = document.getElementById('cricket-sound');

        // Mulai di jam 12:00 Siang
        // 360 derajat = 1 putaran = 12 jam.
        let totalAngle = 360; 
        let lastAngle = 0;
        let isDragging = false;
        
        let playedRooster = false;
        let currentCricketState = false; // false = off, true = on

        function updateTime(e) {
            // Ambil posisi sentuhan jari atau klik mouse
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Cari titik tengah jam
            let rect = clock.getBoundingClientRect();
            let cx = rect.left + rect.width / 2;
            let cy = rect.top + rect.height / 2;

            // Hitung sudut (angle) dari titik tengah ke posisi jari
            let angle = Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;

            if (e.type === 'mousedown' || e.type === 'touchstart') {
                lastAngle = angle;
            }

            // Hitung perbedaan sudut untuk perputaran tanpa batas
            let delta = angle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;

            totalAngle += delta;
            
            // Mencegah angka negatif jauh (mereset ke putaran positif)
            if (totalAngle < 0) totalAngle += 720; 
            
            lastAngle = angle;
            applyTime();
        }

        function applyTime() {
            // 30 derajat jarum pendek = 1 Jam
            let totalHours = totalAngle / 30;
            
            // Ambil format 24 jam (0 - 23.99)
            let time24 = totalHours % 24;
            
            let hours = Math.floor(time24);
            let minutes = Math.floor((time24 - hours) * 60);

            // --- 1. UPDATE JAM DIGITAL ---
            let displayHour = hours % 12 || 12; // Ubah 0 jadi 12
            let displayMin = minutes.toString().padStart(2, '0');
            
            let period = "";
            if (hours >= 4 && hours < 10) period = "Pagi";
            else if (hours >= 10 && hours < 15) period = "Siang";
            else if (hours >= 15 && hours < 18) period = "Sore";
            else period = "Malam";

            digitalClock.innerText = `${displayHour}:${displayMin} ${period}`;

            // --- 2. UPDATE JARUM JAM ---
            hourHand.style.transform = `rotate(${totalAngle}deg)`;
            minuteHand.style.transform = `rotate(${minutes * 6}deg)`; // 6 derajat per menit

            // --- 3. UPDATE MATAHARI & BULAN ---
            // Menggunakan rotasi di atas poros di luar layar untuk membuat busur besar
            // Matahari: Terbit jam 6 pagi (-90deg), puncaknya jam 12 siang (0deg), terbenam jam 6 sore (90deg)
            let sunAngle = (time24 - 12) * 15;
            sunPivot.style.transform = `rotate(${sunAngle}deg)`;

            // Bulan: Selalu berkebalikan 180 derajat dari matahari
            let moonAngle = sunAngle + 180;
            moonPivot.style.transform = `rotate(${moonAngle}deg)`;

            // --- 4. UPDATE WARNA LANGIT & BINTANG ---
            // Menghitung opasitas Malam
            if (time24 >= 6 && time24 <= 18) {
                // Waktu siang hari
                if (time24 < 7) {
                    nightSky.style.opacity = 1 - (time24 - 6); // Pudar dari jam 6-7
                } else if (time24 > 17) {
                    nightSky.style.opacity = time24 - 17; // Muncul dari jam 17-18
                } else {
                    nightSky.style.opacity = 0; // Siang bolong
                }
            } else {
                nightSky.style.opacity = 1; // Malam hari gelap gulita
            }

            // Menghitung opasitas Senja/Fajar (warna orange)
            // Puncak orange di jam 6 pagi dan jam 18 (6 sore)
            let dawnDist = Math.abs(time24 - 6);
            let duskDist = Math.abs(time24 - 18);
            
            let sunsetOpacity = 0;
            if (dawnDist < 1.5) sunsetOpacity = 1 - (dawnDist / 1.5);
            if (duskDist < 1.5) sunsetOpacity = 1 - (duskDist / 1.5);
            sunsetSky.style.opacity = sunsetOpacity;

            // --- 5. BURUNG TERBANG (Pagi Hari 6-10 AM, Maju ke Kanan) ---
            if (hours >= 6 && hours < 10) {
                birds.style.display = 'block';
            } else {
                birds.style.display = 'none';
            }

            // --- 6. SOUND LOGIC (Ayam & Jangkrik) ---
            // Ayam Jago berkokok sekali pada jam 6 pagi
            if (hours === 6) {
                if (!playedRooster) {
                    roosterAudio.play();
                    playedRooster = true;
                }
            } else {
                playedRooster = false;
                roosterAudio.pause();
                roosterAudio.currentTime = 0; // Reset ke awal
            }

            // Jangkrik mengerik di malam hari (e.g., 6 sore ke 6 pagi)
            let isNightForCrickets = (time24 < 6 || time24 > 18);
            if (isNightForCrickets) {
                if (!currentCricketState) {
                    cricketAudio.play();
                    currentCricketState = true;
                }
            } else {
                if (currentCricketState) {
                    cricketAudio.pause();
                    currentCricketState = false;
                }
            }
        }

        // --- EVENT LISTENERS UNTUK DRAG ---
        function startDrag(e) {
            isDragging = true;
            updateTime(e);
            e.preventDefault(); // Mencegah scroll layar
        }

        function doDrag(e) {
            if (isDragging) updateTime(e);
        }

        function stopDrag() {
            isDragging = false;
        }

        // Mouse Events (Untuk Komputer)
        clock.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', stopDrag);

        // Touch Events (Untuk HP / Tablet)
        clock.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', doDrag, {passive: false});
        document.addEventListener('touchend', stopDrag);

        // Inisialisasi posisi awal
        applyTime();
    </script>
</body>
</html>
