<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belajar Waktu ⏰</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            color: #333;
        }

        /* ----- AREA LANGIT & PEMANDANGAN ----- */
        .scene {
            position: relative;
            width: 100%;
            flex: 0 0 auto;
            height: 45vh;
            height: 45dvh;
            max-height: 420px;
            min-height: 200px;
            overflow: hidden;
            background: #aad5eb;
        }

        .sky-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transition: opacity 0.1s;
            pointer-events: none;
        }
        #sunset-sky {
            background: linear-gradient(to bottom, #ffac81, #ff928b);
            opacity: 0;
        }
        #night-sky {
            background: linear-gradient(to bottom, #112d3c, #1a4d6b, #1d6a8b);
            opacity: 0;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(white 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            opacity: 0.6;
        }

        /* Awan */
        .clouds {
            position: absolute;
            top: 15px;
            width: 100%;
            height: 100px;
            opacity: 0.8;
            pointer-events: none;
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            animation: moveClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }
        .cloud-1 {
            width: 80px; height: 32px; top: 10px; left: 20%;
            animation-duration: 25s;
        }
        .cloud-1::before { width: 40px; height: 40px; top: -20px; left: 8px; }
        .cloud-1::after  { width: 32px; height: 32px; top: -12px; left: 40px; }
        .cloud-2 {
            width: 100px; height: 40px; top: 40px; left: 60%;
            animation-duration: 30s; animation-delay: -5s;
        }
        .cloud-2::before { width: 50px; height: 50px; top: -25px; left: 12px; }
        .cloud-2::after  { width: 40px; height: 40px; top: -16px; left: 45px; }

        @keyframes moveClouds {
            from { left: 100%; }
            to   { left: -150px; }
        }

        /* Poros Matahari & Bulan — ukuran pivot dan posisi emoji ikut layar */
        .celestial-pivot {
            position: absolute;
            bottom: -50px;
            left: 50%;
            width: 0; height: 0;
            z-index: 1;
            transform-origin: bottom center;
        }

        .sun, .moon {
            position: absolute;
            /* font-size responsif: 10% dari lebar viewport, min 50px max 100px */
            font-size: clamp(50px, 10vw, 100px);
            /* posisi relatif terhadap ukuran font agar tetap di busur */
            left: -0.5em;
            top: calc(-3.8em - 100px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .moon { color: #f9d71c; }

        /* Pemandangan bukit */
        .landscape {
            position: absolute;
            bottom: -60px;
            left: -15%;
            width: 130%;
            height: 160px;
            background: #27ae60;
            border-radius: 50% 50% 0 0;
            z-index: 2;
            border-top: 5px solid #1f8b4d;
        }
        .landscape-2 {
            position: absolute;
            bottom: -40px;
            right: -25%;
            width: 90%;
            height: 130px;
            background: #1f8b4d;
            border-radius: 50% 50% 0 0;
            z-index: 3;
        }

        /* Elemen pemandangan — bottom diset oleh JS agar selalu nempel bukit */
        .scene-item {
            position: absolute;
            z-index: 4;
            pointer-events: none;
        }
        .house  { left: 15%;  font-size: clamp(150px, 12vw, 200px); }
        .tree-1 { left: 40%;  font-size: clamp(155px, 13vw, 210px); }
        .tree-2 { right: 20%; font-size: clamp(150px, 12vw, 200px); }
        .cat    { left: 60%;  font-size: clamp(30px, 6vw, 60px);
                  animation: wagTail 2s infinite ease-in-out; }

        @keyframes wagTail {
            0%, 100% { transform: rotate(-5deg); }
            50%       { transform: rotate(5deg);  }
        }

        /* Burung */
        .birds {
            position: absolute;
            top: 80px;
            width: 100%;
            display: none;
            z-index: 1;
            pointer-events: none;
        }
        .bird {
            position: absolute;
            heigh: clamp(16px, 4vw, 24px);
            animation: flyBirds 12s linear infinite;
        }
        .bird-1 { left: 10%; top: 10px;  animation-duration: 12s; }
        .bird-2 { left: 30%; top: -20px; animation-duration: 15s; animation-delay: 2s; }
        .bird-3 { left: 15%; top: 40px;  animation-duration: 10s; animation-delay: 1s; }

        @keyframes flyBirds {
            0%   { transform: translateX(-100%) scaleX(1); }
            100% { transform: translateX(110vw)  scaleX(1); }
        }

        /* ----- AREA JAM INTERAKTIF ----- */
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 10;
            background: rgba(255,255,255,0.7);
            border-radius: 30px 30px 0 0;
            /* padding responsif */
            padding: clamp(8px, 2vh, 20px) clamp(8px, 3vw, 20px);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            gap: clamp(6px, 1.5vh, 14px);
        }

        /* Jam digital */
        .digital-clock {
            font-size: clamp(1.4rem, 6vw, 2.8rem);
            font-weight: bold;
            color: #333;
            background: white;
            padding: clamp(8px, 2vw, 15px) clamp(16px, 5vw, 35px);
            border-radius: 25px;
            border: clamp(3px, 1vw, 6px) solid #ffd700;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            text-align: center;
            white-space: nowrap;
        }

        /* Jam analog — ukuran pakai vmin agar proporsional di portrait & landscape */
        .clock {
            position: relative;
            /* clamp: min 180px, ideal 50vmin, max 270px */
            width:  clamp(180px, 50vmin, 270px);
            height: clamp(180px, 50vmin, 270px);
            background: white;
            border-radius: 50%;
            border: clamp(8px, 2vmin, 14px) solid #f39c12;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
            touch-action: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .number {
            position: absolute;
            font-size: clamp(14px, 4vmin, 24px);
            font-weight: bold;
            color: #333;
            width: 100%;
            text-align: center;
            height: 100%;
            top: 0; left: 0;
            pointer-events: none;
        }
        .number span {
            display: inline-block;
            margin-top: clamp(8px, 2vmin, 15px);
        }

        .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width:  clamp(14px, 3.5vmin, 22px);
            height: clamp(14px, 3.5vmin, 22px);
            background: #2c3e50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            border: clamp(2px, 0.8vmin, 4px) solid #ffd700;
        }

        .hand {
            position: absolute;
            bottom: 50%; left: 50%;
            transform-origin: bottom;
            border-radius: 12px;
            z-index: 4;
            pointer-events: none;
        }

        .hour-hand {
            width:  clamp(6px,  1.5vmin, 10px);
            height: clamp(45px, 14vmin, 75px);
            background: #e74c3c;
            margin-left: clamp(-3px, -0.75vmin, -5px);
        }

        .minute-hand {
            width:  clamp(4px,  1vmin, 7px);
            height: clamp(65px, 20vmin, 110px);
            background: #3498db;
            margin-left: clamp(-2px, -0.5vmin, -3.5px);
        }

        .instruction {
            font-size: clamp(0.85rem, 3.5vw, 1.3rem);
            color: #555;
            text-align: center;
            padding: 0 8px;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div id="sunset-sky" class="sky-layer"></div>
        <div id="night-sky" class="sky-layer">
            <div class="stars"></div>
        </div>

        <div class="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
        </div>

        <div class="birds" id="birds">
            <img class="bird bird-1" src="flybird.png" style="height:35px;">
            <img class="bird bird-2" src="flybird.png" style="height:35px;">
            <img class="bird bird-3" src="flybird.png" style="height:35px;">
        </div>

        <div class="celestial-pivot" id="sun-pivot">
            <div class="sun">☀️</div>
        </div>
        <div class="celestial-pivot" id="moon-pivot">
            <div class="moon">🌛</div>
        </div>

        <div class="landscape"></div>
        <div class="landscape-2"></div>

        <div class="scene-item house">🏠</div>
        <div class="scene-item tree-1">🌳</div>
        <div class="scene-item tree-2">🌲</div>
        <div class="scene-item cat">🐈</div>
    </div>

    <div class="controls">
        <div class="digital-clock" id="digital-clock">12:00 Siang</div>

        <div class="clock" id="clock">
            <div class="number" style="transform: rotate(30deg)"><span style="transform: rotate(-30deg)">1</span></div>
            <div class="number" style="transform: rotate(60deg)"><span style="transform: rotate(-60deg)">2</span></div>
            <div class="number" style="transform: rotate(90deg)"><span style="transform: rotate(-90deg)">3</span></div>
            <div class="number" style="transform: rotate(120deg)"><span style="transform: rotate(-120deg)">4</span></div>
            <div class="number" style="transform: rotate(150deg)"><span style="transform: rotate(-150deg)">5</span></div>
            <div class="number" style="transform: rotate(180deg)"><span style="transform: rotate(-180deg)">6</span></div>
            <div class="number" style="transform: rotate(210deg)"><span style="transform: rotate(-210deg)">7</span></div>
            <div class="number" style="transform: rotate(240deg)"><span style="transform: rotate(-240deg)">8</span></div>
            <div class="number" style="transform: rotate(270deg)"><span style="transform: rotate(-270deg)">9</span></div>
            <div class="number" style="transform: rotate(300deg)"><span style="transform: rotate(-300deg)">10</span></div>
            <div class="number" style="transform: rotate(330deg)"><span style="transform: rotate(-330deg)">11</span></div>
            <div class="number" style="transform: rotate(360deg)"><span style="transform: rotate(-360deg)">12</span></div>

            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="minute-hand"></div>
            <div class="center-dot"></div>
        </div>

        <div class="instruction">Putar jamnya dengan jarimu! 👆🐔🦗🐈</div>
    </div>

    <audio id="rooster-sound" preload="auto">
        <source src="rooster-crowing.mp3" type="audio/mpeg">
    </audio>
    <audio id="cricket-sound" preload="auto" loop>
        <source src="cricket.mp3" type="audio/mpeg">
    </audio>

    <script>
        const clock = document.getElementById('clock');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const digitalClock = document.getElementById('digital-clock');

        const sunPivot = document.getElementById('sun-pivot');
        const moonPivot = document.getElementById('moon-pivot');
        const sunsetSky = document.getElementById('sunset-sky');
        const nightSky = document.getElementById('night-sky');
        const birds = document.getElementById('birds');

        const roosterAudio = document.getElementById('rooster-sound');
        const cricketAudio = document.getElementById('cricket-sound');

        let totalAngle = 360;
        let lastAngle = 0;
        let isDragging = false;

        let playedRooster = false;
        let currentCricketState = false;

        function updateTime(e) {
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            let rect = clock.getBoundingClientRect();
            let cx = rect.left + rect.width / 2;
            let cy = rect.top + rect.height / 2;

            let angle = Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;

            if (e.type === 'mousedown' || e.type === 'touchstart') {
                lastAngle = angle;
            }

            let delta = angle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;

            totalAngle += delta;
            if (totalAngle < 0) totalAngle += 720;

            lastAngle = angle;
            // Posisikan scene-item tepat di atas puncak bukit secara real-time
        function positionItems() {
            const scene     = document.querySelector(".scene");
            const landscape = document.querySelector(".landscape");
            const sceneRect = scene.getBoundingClientRect();
            const hillRect  = landscape.getBoundingClientRect();

            // Jarak puncak bukit dari bawah scene
            const hillPeakFromBottom = (sceneRect.bottom - hillRect.top) - 70;

            const items = [
                { sel: ".house",  extra: 0   },
                { sel: ".tree-1", extra: 0   },
                { sel: ".tree-2", extra: 0   },
                { sel: ".cat",    extra: -12 },
            ];
            items.forEach(function({ sel, extra }) {
                const el = document.querySelector(sel);
                if (!el) return;
                el.style.top    = "auto";
                el.style.bottom = (hillPeakFromBottom + extra) + "px";
            });
        }

        positionItems();
        applyTime();
        window.addEventListener("resize", positionItems);
        }

        function applyTime() {
            let totalHours = totalAngle / 30;
            let time24 = totalHours % 24;

            let hours = Math.floor(time24);
            let minutes = Math.floor((time24 - hours) * 60);

            let displayHour = hours % 12 || 12;
            let displayMin = minutes.toString().padStart(2, '0');

            let period = "";
            if (hours >= 4 && hours < 10) period = "Pagi";
            else if (hours >= 10 && hours < 15) period = "Siang";
            else if (hours >= 15 && hours < 18) period = "Sore";
            else period = "Malam";

            digitalClock.innerText = `${displayHour}:${displayMin} ${period}`;

            hourHand.style.transform = `rotate(${totalAngle}deg)`;
            minuteHand.style.transform = `rotate(${minutes * 6}deg)`;

            let sunAngle = (time24 - 12) * 15;
            sunPivot.style.transform = `rotate(${sunAngle}deg)`;

            let moonAngle = sunAngle + 180;
            moonPivot.style.transform = `rotate(${moonAngle}deg)`;

            if (time24 >= 6 && time24 <= 18) {
                if (time24 < 7) {
                    nightSky.style.opacity = 1 - (time24 - 6);
                } else if (time24 > 17) {
                    nightSky.style.opacity = time24 - 17;
                } else {
                    nightSky.style.opacity = 0;
                }
            } else {
                nightSky.style.opacity = 1;
            }

            let dawnDist = Math.abs(time24 - 6);
            let duskDist = Math.abs(time24 - 18);

            let sunsetOpacity = 0;
            if (dawnDist < 1.5) sunsetOpacity = 1 - (dawnDist / 1.5);
            if (duskDist < 1.5) sunsetOpacity = 1 - (duskDist / 1.5);
            sunsetSky.style.opacity = sunsetOpacity;

            if (hours >= 6 && hours < 10) {
                birds.style.display = 'block';
            } else {
                birds.style.display = 'none';
            }

            if (hours === 6) {
                if (!playedRooster) {
                    roosterAudio.play();
                    playedRooster = true;
                }
            } else {
                playedRooster = false;
                roosterAudio.pause();
                roosterAudio.currentTime = 0;
            }

            let isNightForCrickets = (time24 < 6 || time24 > 18);
            if (isNightForCrickets) {
                if (!currentCricketState) {
                    cricketAudio.play();
                    currentCricketState = true;
                }
            } else {
                if (currentCricketState) {
                    cricketAudio.pause();
                    currentCricketState = false;
                }
            }
        }

        function startDrag(e) {
            isDragging = true;
            updateTime(e);
            e.preventDefault();
        }

        function doDrag(e) {
            if (isDragging) updateTime(e);
        }

        function stopDrag() {
            isDragging = false;
        }

        clock.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', stopDrag);

        clock.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', doDrag, {passive: false});
        document.addEventListener('touchend', stopDrag);

        // Posisikan scene-item tepat di atas puncak bukit secara real-time
        function positionItems() {
            const scene     = document.querySelector(".scene");
            const landscape = document.querySelector(".landscape");
            const sceneRect = scene.getBoundingClientRect();
            const hillRect  = landscape.getBoundingClientRect();

            // Jarak puncak bukit dari bawah scene
            const hillPeakFromBottom = (sceneRect.bottom - hillRect.top) - 70;

            const items = [
                { sel: ".house",  extra: 0   },
                { sel: ".tree-1", extra: 0   },
                { sel: ".tree-2", extra: 0   },
                { sel: ".cat",    extra: -12 },
            ];
            items.forEach(function({ sel, extra }) {
                const el = document.querySelector(sel);
                if (!el) return;
                el.style.top    = "auto";
                el.style.bottom = (hillPeakFromBottom + extra) + "px";
            });
        }

        positionItems();
        applyTime();
        window.addEventListener("resize", positionItems);
    </script>
</body>
</html>
